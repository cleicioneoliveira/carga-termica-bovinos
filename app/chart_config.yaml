# ------------------------------------------------------------
# Chart configuration
# ------------------------------------------------------------
chart:
  title: "Cattle Functional Comfort Analysis"
  t_min: 0
  t_max: 40
  y_min: 0.0
  y_max: 0.030
  pressure: 101325

# ------------------------------------------------------------
# Classical isolines
# ------------------------------------------------------------
isolines:
  relative_humidity:
    enabled: True
    color: "blue"
    labels: True
  enthalpy:
    enabled: True
    color: "red"
    labels: True
      
indexes:
  - index: ITU
    label: ITU
    render:
      isolines:
        levels: [62, 68, 72, 78, 84, 90]
        color: black
        linewidth: 1.2
        style: ":"
        label: true

